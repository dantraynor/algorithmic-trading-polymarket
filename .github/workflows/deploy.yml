name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tradingbot
  IMAGE_TAG: ${{ github.sha }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ingestion: ${{ steps.filter.outputs.ingestion }}
      signal-core: ${{ steps.filter.outputs.signal-core }}
      execution: ${{ steps.filter.outputs.execution }}
      settlement: ${{ steps.filter.outputs.settlement }}
      btc-5m: ${{ steps.filter.outputs.btc-5m }}
      btc-5m-momentum: ${{ steps.filter.outputs.btc-5m-momentum }}
      btc-5m-latency: ${{ steps.filter.outputs.btc-5m-latency }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ingestion:
              - 'ingestion/**'
            signal-core:
              - 'signal-core/**'
            execution:
              - 'execution/**'
              - 'shared/**'
            settlement:
              - 'settlement/**'
              - 'shared/**'
            btc-5m:
              - 'btc-5m/**'
              - 'shared/**'
            btc-5m-momentum:
              - 'btc-5m-momentum/**'
              - 'shared/**'
            btc-5m-latency:
              - 'btc-5m-latency/**'
              - 'shared/**'
            dashboard:
              - 'dashboard/**'
              - 'shared/**'

  build-and-push:
    runs-on: ubuntu-latest
    needs: detect-changes
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push ingestion
        if: needs.detect-changes.outputs.ingestion == 'true'
        run: |
          docker build -t $REGISTRY/ingestion:$IMAGE_TAG -t $REGISTRY/ingestion:latest ./ingestion
          docker push $REGISTRY/ingestion --all-tags

      - name: Build and push signal-core
        if: needs.detect-changes.outputs.signal-core == 'true'
        run: |
          docker build -t $REGISTRY/signal-core:$IMAGE_TAG -t $REGISTRY/signal-core:latest ./signal-core
          docker push $REGISTRY/signal-core --all-tags

      - name: Build and push execution
        if: needs.detect-changes.outputs.execution == 'true'
        run: |
          docker build -t $REGISTRY/execution:$IMAGE_TAG -t $REGISTRY/execution:latest ./execution
          docker push $REGISTRY/execution --all-tags

      - name: Build and push settlement
        if: needs.detect-changes.outputs.settlement == 'true'
        run: |
          docker build -t $REGISTRY/settlement:$IMAGE_TAG -t $REGISTRY/settlement:latest ./settlement
          docker push $REGISTRY/settlement --all-tags

      - name: Build and push btc-5m
        if: needs.detect-changes.outputs.btc-5m == 'true'
        run: |
          docker build -t $REGISTRY/btc-5m:$IMAGE_TAG -t $REGISTRY/btc-5m:latest ./btc-5m
          docker push $REGISTRY/btc-5m --all-tags

      - name: Build and push btc-5m-momentum
        if: needs.detect-changes.outputs.btc-5m-momentum == 'true'
        run: |
          docker build -t $REGISTRY/btc-5m-momentum:$IMAGE_TAG -t $REGISTRY/btc-5m-momentum:latest ./btc-5m-momentum
          docker push $REGISTRY/btc-5m-momentum --all-tags

      - name: Build and push btc-5m-latency
        if: needs.detect-changes.outputs.btc-5m-latency == 'true'
        run: |
          docker build -t $REGISTRY/btc-5m-latency:$IMAGE_TAG -t $REGISTRY/btc-5m-latency:latest ./btc-5m-latency
          docker push $REGISTRY/btc-5m-latency --all-tags

      - name: Build and push dashboard
        if: needs.detect-changes.outputs.dashboard == 'true'
        run: |
          docker build -t $REGISTRY/dashboard:$IMAGE_TAG -t $REGISTRY/dashboard:latest ./dashboard
          docker push $REGISTRY/dashboard --all-tags

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Copy scripts to GCE
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCE_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          source: "first-run-setup.sh,scripts/derive-keys.js,docker-compose.yml,docker-compose.prod.yml"
          target: /opt/tradingbot
          overwrite: true

      - name: Deploy to GCE
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCE_INSTANCE_IP }}
          username: ubuntu
          key: ${{ secrets.GCE_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/tradingbot
            chmod +x first-run-setup.sh

            # Persist registry config so manual restarts and rollbacks work
            # docker compose auto-loads .env, so append/update there
            sed -i '/^REGISTRY_PREFIX=/d; /^IMAGE_TAG=/d' .env 2>/dev/null || true
            echo "REGISTRY_PREFIX=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tradingbot" >> .env
            echo "IMAGE_TAG=${{ github.sha }}" >> .env

            export REGISTRY_PREFIX=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tradingbot
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker system prune -af --filter "until=24h"

            # Verify all services are healthy (check for exited or restarting)
            sleep 15
            UNHEALTHY=$(docker compose -f docker-compose.yml -f docker-compose.prod.yml ps --format '{{.Service}} {{.State}}' | grep -vE 'running|healthy' | awk '{print $1}')
            if [ -n "$UNHEALTHY" ]; then
              echo "DEPLOY FAILED - unhealthy services: $UNHEALTHY"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=20 $UNHEALTHY
              exit 1
            fi
            echo "All services running successfully"
