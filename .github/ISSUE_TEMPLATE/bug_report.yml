name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Demo
        - Paper
        - Live
        - Development
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove private keys, API credentials, wallet addresses you do not want public, and RPC credentials.
      render: shell
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets from this report.
          required: true
