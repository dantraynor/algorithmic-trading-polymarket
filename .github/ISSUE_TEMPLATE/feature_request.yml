name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Demo/onboarding
        - Dashboard
        - Strategy development
        - Risk/safety
        - Execution
        - Infrastructure
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard, confusing, risky, or missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety impact
      options:
        - label: This does not make live trading easier to enable accidentally.
          required: true
